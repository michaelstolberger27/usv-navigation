name: CI

on:
  push:
    branches: [main, Updates]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # hybrid-automaton is not published on PyPI; install from source first
      # so `pip install -e .` can resolve it.
      - name: Install hybrid-automaton
        run: pip install "hybrid-automaton @ git+https://github.com/rymc-dev/hybrid-automaton.git"

      - name: Install package
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest -q
